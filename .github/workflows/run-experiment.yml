name: Run Context Drift Experiment

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - full

jobs:
  experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download CMAPSS data
        run: python scripts/get_data.py

      - name: Run self-test (deterministic core)
        run: python scripts/selftest.py

      - name: Run Block A
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.mode }}" = "smoke" ]; then
            python src/run_block_a.py --smoke
          else
            python src/run_block_a.py
          fi

      - name: Run Block B
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.mode }}" = "smoke" ]; then
            python src/run_block_b.py --smoke
          else
            python src/run_block_b.py
          fi

      - name: Generate figures
        run: python src/analyze.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: experiment-results-${{ github.event.inputs.mode }}
          path: |
            results/*.csv
            figures/*.png
          if-no-files-found: warn
